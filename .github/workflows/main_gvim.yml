name: Build and deploy Python app to Azure Web App - GVIM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Cairo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libcairo2-dev pkg-config
          sudo apt-get install -y libpkgconf-dev

      - name: Set PKG_CONFIG_PATH for Cairo
        run: |
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: pip install -r requirements.txt
        
      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      # Add a longer delay before deployment to avoid SCM container restart conflict
      - name: Wait before deployment
        run: sleep 120  # Wait for 2 minutes before deploying

      # Retry logic for deployment with 3 attempts
      - name: Retry Deployment (3 attempts)
        run: |
          for i in {1..3}
          do
            echo "Attempt $i of 3"
            az webapp deploy --resource-group 'YourResourceGroup' --name 'GVIM' --src-path release.zip --slot 'Production' && break
            echo "Deployment failed, retrying in 30 seconds..."
            sleep 30
          done
